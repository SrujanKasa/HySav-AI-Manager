openapi: 3.1.0
info:
  title: HySav API
  version: "1.0.0"
  description: >
    HySav | AI Monit backend. AI-subscription tracking, usage monitoring, and
    waste detection for small teams. All endpoints are under /api/v1. Auth is
    an opaque bearer token from /auth/register or /auth/login. Money is integer
    cents; timestamps are ISO-8601 strings.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: auth
  - name: workspaces
  - name: tools
  - name: usage
  - name: integrations
  - name: insights
  - name: notifications
  - name: billing
  - name: demo

paths:
  /health:
    get:
      security: []
      tags: [demo]
      summary: Liveness check
      responses:
        "200": { description: OK }

  /auth/register:
    post:
      security: []
      tags: [auth]
      summary: Create an account + its first workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, password, workspaceName]
              properties:
                email: { type: string, format: email }
                name: { type: string }
                password: { type: string, minLength: 10 }
                workspaceName: { type: string }
      responses:
        "201":
          description: Account created; returns bearer token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: "#/components/schemas/User" }
                  workspaceId: { type: string }
        "409": { description: Email already registered }
        "429": { description: Rate limited (10/min per IP on auth routes) }

  /auth/login:
    post:
      security: []
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200": { description: Token + user }
        "401": { description: Invalid credentials (same response for unknown email) }

  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke the current session token
      responses:
        "204": { description: Logged out }

  /auth/me:
    get:
      tags: [auth]
      summary: Current user + workspace memberships
      responses:
        "200": { description: User and workspaces }

  /workspaces/{id}:
    get:
      tags: [workspaces]
      summary: Workspace details + members
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "200": { description: Workspace with members }
        "404": { description: Not found or not a member }
    patch:
      tags: [workspaces]
      summary: Rename workspace (admin)
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "200": { description: Updated }

  /workspaces/{id}/members/{userId}:
    patch:
      tags: [workspaces]
      summary: Change a member's role/title/color (admin)
      description: Demoting the workspace's only admin is refused.
      parameters:
        - { $ref: "#/components/parameters/workspaceId" }
        - { name: userId, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string, enum: [admin, member] }
                title: { type: string }
                color: { type: string, pattern: "^#[0-9a-fA-F]{6}$" }
      responses:
        "200": { description: Updated }
        "400": { description: Would remove the last admin }
    delete:
      tags: [workspaces]
      summary: Remove a member from the workspace (admin)
      description: >
        Detaches them from tools and prefs; their user account survives.
        Removing the only admin is refused.
      parameters:
        - { $ref: "#/components/parameters/workspaceId" }
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Removed }
        "400": { description: Would remove the last admin }

  /workspaces/{id}/plan:
    get:
      tags: [billing]
      summary: Plan gate status (any member)
      description: >
        active/reason (paid | trial | expired) + trialEndsAt/paidUntil. Write
        endpoints (tool create/update, usage, imports, invites, integrations)
        return 402 with a clear message when expired; reads and spend-reducing
        actions (cancelling/deleting tools) always work.
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "200": { description: Plan status }

  /catalog/tools:
    get:
      security: []
      tags: [tools]
      summary: Curated catalog of common AI tools (public, cacheable)
      description: >
        Slugs match the site's logo assets so pickers get icons for free;
        entries carry category, typical credit unit, and which usage provider
        (openai/anthropic/manual) fits.
      responses:
        "200": { description: Catalog entries }

  /workspaces/{id}/invites:
    post:
      tags: [workspaces]
      summary: Invite a teammate by email (admin)
      description: Sends an invite email and returns the invite link (7-day expiry).
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                role: { type: string, enum: [admin, member], default: member }
      responses:
        "201": { description: Invite created; includes inviteLink }

  /invites/accept:
    post:
      security: []
      tags: [workspaces]
      summary: Accept an invite (creates the account if needed)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [token, name, password]
              properties:
                token: { type: string }
                name: { type: string }
                password: { type: string, minLength: 10 }
      responses:
        "201": { description: Joined workspace }
        "400": { description: Invalid, expired, or used invite }

  /workspaces/{id}/tools:
    get:
      tags: [tools]
      summary: List subscriptions (with member assignments)
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "200":
          description: Tools
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Tool" }
    post:
      tags: [tools]
      summary: Add a subscription (admin)
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ToolInput" }
      responses:
        "201": { description: Created }

  /workspaces/{id}/tools/import:
    post:
      tags: [tools]
      summary: CSV import (admin) — the primary bulk path
      description: >
        Body is CSV text (Content-Type text/csv, or JSON {"csv": "..."}).
        Header row: name,category,cost,billing_cycle,renewal_date,plan,status,
        credit_limit,credit_unit,used. Creates unknown tools; appends a usage
        snapshot when `used` is present. Cost is dollars.
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "201": { description: Per-row results }

  /tools/{id}:
    get:
      tags: [tools]
      summary: Tool detail + full snapshot history (trend data)
      parameters: [{ $ref: "#/components/parameters/toolId" }]
      responses:
        "200": { description: Tool with members and snapshots }
    patch:
      tags: [tools]
      summary: Update a tool (admin)
      parameters: [{ $ref: "#/components/parameters/toolId" }]
      responses:
        "200": { description: Updated }
    delete:
      tags: [tools]
      summary: Delete a tool and its history (admin)
      parameters: [{ $ref: "#/components/parameters/toolId" }]
      responses:
        "204": { description: Deleted }

  /tools/{id}/usage:
    post:
      tags: [usage]
      summary: Report usage manually (any member)
      description: >
        Appends a usage snapshot — the same table provider syncs write to, so
        downstream logic doesn't care where numbers come from. Also refreshes
        the reporter's seat activity.
      parameters: [{ $ref: "#/components/parameters/toolId" }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [used]
              properties:
                used: { type: number, description: cumulative usage this billing period }
                limit: { type: number, nullable: true }
                capturedAt: { type: string, format: date-time }
      responses:
        "201": { description: Snapshot recorded }

  /workspaces/{id}/integrations:
    get:
      tags: [integrations]
      summary: Provider catalog (with honest live/stub status) + connected credentials
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "200": { description: Providers and connections (keyLast4 only — never the key) }
    post:
      tags: [integrations]
      summary: Connect a provider credential (admin)
      description: Key is AES-256-GCM encrypted at rest and never returned or logged.
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [provider, apiKey]
              properties:
                provider: { type: string, enum: [openai, anthropic, vercel] }
                apiKey: { type: string }
      responses:
        "201": { description: Stored; returns keyLast4 }
        "400": { description: Provider is stubbed / manual-only }

  /workspaces/{id}/integrations/{provider}:
    delete:
      tags: [integrations]
      summary: Disconnect a provider (admin)
      parameters:
        - { $ref: "#/components/parameters/workspaceId" }
        - { name: provider, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Removed }

  /workspaces/{id}/integrations/{provider}/sync:
    post:
      tags: [integrations]
      summary: Pull fresh usage from the provider API (admin)
      description: >
        Syncs every tool whose usage_source matches the provider. Live today:
        openai (org Costs API, Admin key), anthropic (Admin cost report).
        vercel is stubbed and rejects sync.
      parameters:
        - { $ref: "#/components/parameters/workspaceId" }
        - { name: provider, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Per-tool sync results }

  /workspaces/{id}/insights:
    get:
      tags: [insights]
      summary: Waste report — flags, per-tool health, wasted spend total
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "200": { description: Waste report (cents) }

  /workspaces/{id}/dashboard:
    get:
      tags: [insights]
      summary: Dashboard payload (members, tools with usage %, alerts)
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "200": { description: Same shape the frontend demo renders }

  /workspaces/{id}/notifications/scan:
    post:
      tags: [notifications]
      summary: Run the waste/renewal alert scan now (admin)
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "200": { description: Flags found; deduped emails queued }

  /workspaces/{id}/notifications/digest:
    post:
      tags: [notifications]
      summary: Send the summary digest now (admin)
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "200": { description: Digest queued for members with the pref enabled }

  /workspaces/{id}/notification-prefs:
    get:
      tags: [notifications]
      summary: Current user's prefs for this workspace
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "200": { description: wasteAlerts / renewalAlerts / weeklyDigest booleans }
    patch:
      tags: [notifications]
      summary: Update prefs (per user, per workspace)
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "200": { description: Updated prefs }

  /workspaces/{id}/billing:
    get:
      tags: [billing]
      summary: Plan quote + trial/subscription status
      description: >
        Pricing is ₹300/month for up to 3 members, +₹100/month past 3, and
        +₹50/month per member beyond 4 (amounts in integer paise, computed from
        the live member count). Every workspace starts on the Starter plan — a
        3-day full-feature trial from creation, returned as `trial.endsAt`.
        `active` is true during the trial or a paid period. `configured` says
        whether Razorpay keys are set on the server.
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "200": { description: Quote, configured flag, trial status, paidUntil/active }

  /workspaces/{id}/billing/order:
    post:
      tags: [billing]
      summary: Create a Razorpay order for this workspace's plan (admin)
      description: >
        Returns orderId + the publishable keyId for Razorpay Checkout. Amount
        is computed server-side from the member count — never trusted from the
        client. 503 until RAZORPAY_KEY_ID/RAZORPAY_KEY_SECRET are configured
        (test keys work).
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "201": { description: orderId, amountPaise, currency, keyId, description }
        "503": { description: Razorpay keys not configured yet }

  /workspaces/{id}/billing/create-subscription:
    post:
      tags: [billing]
      summary: Create a Razorpay subscription for this workspace's plan (admin)
      description: >
        Recurring flow used by the pricing page. Creates a Razorpay Plan for
        the current server-side quote, then a monthly Subscription (12 cycles).
        Returns subscriptionId + the publishable keyId for Checkout; the
        key_secret never leaves the server. 503 until Razorpay keys are set.
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      responses:
        "201": { description: subscriptionId, amountPaise, currency, keyId, description }
        "503": { description: Razorpay keys not configured yet }

  /workspaces/{id}/billing/verify-subscription:
    post:
      tags: [billing]
      summary: Verify a subscription-checkout signature and activate the plan (admin)
      description: >
        Signature is HMAC-SHA256(payment_id + "|" + subscription_id) — note the
        operand order differs from the one-time order flow.
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [razorpayPaymentId, razorpaySubscriptionId, razorpaySignature]
              properties:
                razorpayPaymentId: { type: string }
                razorpaySubscriptionId: { type: string }
                razorpaySignature: { type: string }
      responses:
        "200": { description: Plan active; paidUntil returned }
        "400": { description: Signature verification failed }

  /workspaces/{id}/billing/verify:
    post:
      tags: [billing]
      summary: Verify a checkout-success signature and activate the plan (admin)
      parameters: [{ $ref: "#/components/parameters/workspaceId" }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [razorpayOrderId, razorpayPaymentId, razorpaySignature]
              properties:
                razorpayOrderId: { type: string }
                razorpayPaymentId: { type: string }
                razorpaySignature: { type: string }
      responses:
        "200": { description: Plan active; paidUntil returned }
        "400": { description: Signature verification failed }

  /billing/webhook:
    post:
      security: []
      tags: [billing]
      summary: Razorpay server-to-server webhook (HMAC-verified)
      description: >
        Configure this URL + RAZORPAY_WEBHOOK_SECRET in the Razorpay dashboard.
        Handles payment.captured / order.paid. The x-razorpay-signature HMAC of
        the raw body is the credential.
      responses:
        "200": { description: Acknowledged }
        "400": { description: Invalid signature }

  /demo/dashboard:
    get:
      security: []
      tags: [demo]
      summary: Public read-only dashboard for the seeded demo workspace
      responses:
        "200": { description: Dashboard payload the marketing site's live demo renders }
        "503": { description: Demo workspace not seeded }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    workspaceId:
      name: id
      in: path
      required: true
      schema: { type: string }
    toolId:
      name: id
      in: path
      required: true
      schema: { type: string }
  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
    ToolInput:
      type: object
      required: [name, category, costCents, renewalDate]
      properties:
        name: { type: string }
        slug: { type: string, pattern: "^[a-z0-9-]+$" }
        category:
          type: string
          enum: [llm-chat, coding-assistant, image-gen, video-gen, copywriting, voice, search, productivity, presentation, other]
        icon: { type: string, format: uri, nullable: true }
        plan: { type: string }
        status: { type: string, enum: [active, trial, cancelled], default: active }
        costCents: { type: integer, minimum: 0 }
        billingCycle: { type: string, enum: [monthly, annual], default: monthly }
        renewalDate: { type: string, format: date }
        creditLimit: { type: number, nullable: true }
        creditUnit: { type: string, nullable: true }
        usageSource: { type: string, enum: [manual, openai, anthropic, vercel], default: manual }
        note: { type: string, nullable: true }
        memberIds: { type: array, items: { type: string } }
    Tool:
      allOf:
        - $ref: "#/components/schemas/ToolInput"
        - type: object
          properties:
            id: { type: string }
            workspaceId: { type: string }
            lastUsageUpdateAt: { type: string, nullable: true }
            createdAt: { type: string }
            updatedAt: { type: string }
