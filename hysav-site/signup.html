<!DOCTYPE html>
<!-- Brand name: "HySav" — find & replace this string across all files to rename -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HySav — Create your workspace</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
</head>
<body>

<header class="nav">
  <div class="wrap nav-inner">
    <a class="brand" href="index.html">
      <span class="brand-hy">Hy</span><span class="brand-sav">Sav</span>
      <span class="brand-div" aria-hidden="true"></span>
      <span class="brand-tag">AI Monit</span>
    </a>
    <nav class="nav-links">
      <a href="pricing.html">Pricing</a>
      <a class="btn btn-primary btn-sm" href="login.html">Log in</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <form class="auth-wrap" id="signup-form" novalidate>
    <h2>Create your workspace</h2>
    <p class="auth-sub">Starts with a 3-day free trial of everything. No card required.</p>

    <label for="su-name">Your name</label>
    <input type="text" id="su-name" autocomplete="name" placeholder="Maya Kern" required />

    <label for="su-workspace">Company / workspace name</label>
    <input type="text" id="su-workspace" autocomplete="organization" placeholder="Otterworks Inc." required />

    <label for="su-email">Work email</label>
    <input type="email" id="su-email" autocomplete="email" placeholder="you@company.com" required />

    <label for="su-password">Password <span class="muted small">(10+ characters)</span></label>
    <input type="password" id="su-password" autocomplete="new-password" placeholder="••••••••••" minlength="10" required />

    <div class="auth-err" id="su-err" role="alert"></div>
    <button class="btn btn-primary" type="submit" id="su-submit">Start the free trial</button>
    <p class="auth-alt">Already have a workspace? <a href="login.html">Log in</a></p>
  </form>
</main>

<script src="auth.js"></script>
<script>
(function () {
  if (HySav.token()) { window.location.href = "account.html"; return; }
  var form = document.getElementById("signup-form");
  var err = document.getElementById("su-err");
  var btn = document.getElementById("su-submit");
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    err.classList.remove("show");
    btn.disabled = true;
    btn.textContent = "Creating workspace…";
    HySav.api("/auth/register", {
      method: "POST",
      body: {
        name: document.getElementById("su-name").value.trim(),
        workspaceName: document.getElementById("su-workspace").value.trim(),
        email: document.getElementById("su-email").value.trim(),
        password: document.getElementById("su-password").value
      }
    }).then(function (data) {
      HySav.setToken(data.token);
      window.location.href = "account.html";
    }).catch(function (e2) {
      err.textContent = e2.message;
      err.classList.add("show");
      btn.disabled = false;
      btn.textContent = "Start the free trial";
    });
  });
})();
</script>
</body>
</html>
